version: 2

models:
  - name: stg_orders
    description: "Cleaned and typed orders. One row per order."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              values: ['delivered','shipped','canceled','processing',
                       'approved','invoiced','unavailable','created']

  - name: stg_customers
    description: "Customer dimension. One row per customer_id."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null

  - name: stg_order_items
    description: "Order line items. Multiple rows per order."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null

  - name: stg_order_payments
    description: "Payment records per order."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_type
        tests:
          - accepted_values:
              values: ['credit_card','boleto','voucher','debit_card','not_defined']

  - name: stg_products
    description: "Product catalogue."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_sellers
    description: "Seller dimension."
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null