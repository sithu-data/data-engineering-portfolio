version: 2

models:
  - name: mart_customer_segments
    description: "RFM-based customer segmentation. One row per unique customer with recency, frequency, monetary scores and segment label.
                  Note: ntile() window functions can produce tied scores for customers with identical RFM values. A row_number() dedup is 
                  applied keeping the highest rfm_total per customer to ensure one row per customer_unique_id."
    columns:
      - name: customer_unique_id
        description: "Primary key — unique customer identifier"
        tests:
          - unique
          - not_null
      - name: customer_city
        description: "City of the customer"
      - name: customer_state
        description: "Brazilian state code of the customer"
      - name: last_order_date
        description: "Date of the customer's most recent delivered order"
        tests:
          - not_null
      - name: frequency
        description: "Total number of delivered orders placed by this customer"
        tests:
          - not_null
      - name: monetary
        description: "Total revenue generated by this customer"
        tests:
          - not_null
      - name: avg_order_value
        description: "Average revenue per order for this customer"
        tests:
          - not_null
      - name: avg_review_score
        description: "Average review score given by this customer"
      - name: total_items_bought
        description: "Total number of items purchased across all orders"
        tests:
          - not_null
      - name: recency
        description: "Days since last order"
        tests:
          - not_null
      - name: r_score
        description: "Recency score 1-5. 5 = most recent"
        tests:
          - not_null
      - name: f_score
        description: "Frequency score 1-5. 5 = most frequent"
        tests:
          - not_null
      - name: m_score
        description: "Monetary score 1-5. 5 = highest spend"
        tests:
          - not_null
      - name: rfm_total
        description: "Sum of r_score, f_score and m_score. Max 15."
        tests:
          - not_null
      - name: customer_segment
        description: "RFM segment label assigned based on score combination"
        tests:
          - not_null
          - accepted_values:
              values: ['Champions','Loyal Customers','Recent Customers',
                       'Potential Loyalists','At Risk','Cannot Lose Them',
                       'Lost','Needs Attention']

  - name: mart_cohort_retention
    description: "Monthly cohort retention analysis. Shows percentage of customers from each cohort who returned in subsequent months."
    columns:
      - name: cohort_month
        description: "Month when the cohort first purchased"
        tests:
          - not_null
      - name: period_number
        description: "Months since first purchase. 0 = acquisition month"
        tests:
          - not_null
      - name: cohort_customers
        description: "Total customers in this cohort"
        tests:
          - not_null
      - name: retained_customers
        description: "Customers from this cohort who purchased in this period"
        tests:
          - not_null
      - name: retention_rate
        description: "Percentage of cohort customers who returned. 100% at period 0."
        tests:
          - not_null