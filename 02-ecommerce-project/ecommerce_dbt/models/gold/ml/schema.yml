version: 2

models:
  - name: mart_churn_features
    description: "ML-ready feature table for customer churn prediction. One row per unique customer with behavioural features and binary churn label."
    columns:
      - name: customer_unique_id
        description: "Primary key — unique customer identifier"
        tests:
          - unique
          - not_null
      - name: total_orders
        description: "Total number of delivered orders"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue generated by this customer"
        tests:
          - not_null
      - name: avg_order_value
        description: "Average revenue per order"
        tests:
          - not_null
      - name: min_order_value
        description: "Smallest order value placed by this customer"
      - name: max_order_value
        description: "Largest order value placed by this customer"
      - name: avg_items_per_order
        description: "Average number of items per order"
      - name: avg_review_score
        description: "Average review score given by this customer"
      - name: min_review_score
        description: "Lowest review score given by this customer"
      - name: avg_delivery_days
        description: "Average delivery days experienced by this customer"
      - name: on_time_deliveries
        description: "Number of orders delivered on time"
        tests:
          - not_null
      - name: states_ordered_from
        description: "Number of distinct states this customer has ordered from"
      - name: distinct_payment_methods
        description: "Number of distinct payment method types used"
      - name: avg_installments
        description: "Average number of installments used across orders"
      - name: customer_lifespan_days
        description: "Days between first and last order"
        tests:
          - not_null
      - name: days_since_last_order
        description: "Days between last order and today"
        tests:
          - not_null
      - name: is_churned
        description: "1 if customer has not ordered in 180+ days, else 0"
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]