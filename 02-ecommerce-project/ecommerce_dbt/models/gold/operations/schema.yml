version: 2

models:
  - name: mart_seller_performance
    description: "Seller-level performance metrics. One row per seller."
    columns:
      - name: seller_id
        description: "Primary key — unique seller identifier"
        tests:
          - unique
          - not_null
      - name: seller_city
        description: "City where the seller is based"
      - name: seller_state
        description: "Brazilian state code of the seller"
      - name: total_orders
        description: "Total delivered orders fulfilled by this seller"
        tests:
          - not_null
      - name: unique_products
        description: "Number of distinct products sold by this seller"
        tests:
          - not_null
      - name: total_revenue
        description: "Total item revenue generated by this seller"
        tests:
          - not_null
      - name: avg_item_price
        description: "Average item price across all this seller's products"
        tests:
          - not_null
      - name: total_freight_charged
        description: "Total freight costs charged across all this seller's orders"
      - name: avg_delivery_days
        description: "Average days from purchase to delivery for this seller"
      - name: on_time_rate
        description: "Percentage of this seller's orders delivered on time"
      - name: avg_review_score
        description: "Average review score across all this seller's orders"
      - name: first_sale_date
        description: "Date of this seller's first delivered order"
      - name: last_sale_date
        description: "Date of this seller's most recent delivered order"

  - name: mart_delivery_operations
    description: "Monthly delivery operations metrics by customer state. Tracks on-time rates, delivery days distribution and impact on review scores."
    columns:
      - name: order_month
        description: "Month of purchase"
        tests:
          - not_null
      - name: customer_state
        description: "Brazilian state code of the customer"
        tests:
          - not_null
      - name: total_orders
        description: "Total delivered orders for this state and month"
        tests:
          - not_null
      - name: avg_delivery_days
        description: "Average days from purchase to delivery"
        tests:
          - not_null
      - name: min_delivery_days
        description: "Fastest delivery in days for this state and month"
      - name: max_delivery_days
        description: "Slowest delivery in days for this state and month"
      - name: median_delivery_days
        description: "Median delivery days — more robust than average for skewed data"
      - name: p95_delivery_days
        description: "95th percentile delivery days — captures worst case performance"
      - name: on_time_count
        description: "Number of orders delivered on or before estimated date"
        tests:
          - not_null
      - name: late_count
        description: "Number of orders delivered after estimated date"
        tests:
          - not_null
      - name: on_time_rate
        description: "Percentage of orders delivered on time for this state and month"
        tests:
          - not_null
      - name: avg_freight_cost
        description: "Average freight cost per order for this state and month"
      - name: avg_review_score
        description: "Overall average review score for this state and month"
      - name: avg_review_score_late
        description: "Average review score for late deliveries — shows impact of delays on satisfaction"
      - name: avg_review_score_on_time
        description: "Average review score for on-time deliveries"